<form method="POST">

    <input type="text" name="name" placeholder="Your Name" required><br><br>

    <input type="text" name="phone" placeholder="Mobile Number" required><br><br>

    <input type="text" name="whatsapp" placeholder="WhatsApp Number" required><br><br>

    <select name="service" required>
    <option value="">Select Service</option>

    {% for service in services %}
        <option value="{{ service['service_name'] }}">
            {{ service['service_name'] }}
        </option>
    {% endfor %}

</select><br><br>

    <textarea name="requirement" placeholder="Tell your requirement" required></textarea><br><br>

    <input type="hidden" name="source_page" value="{{ source_page }}">

    <button type="submit">Submit</button>

</form>

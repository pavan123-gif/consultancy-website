<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="bg-dark text-white p-3 d-flex flex-column" style="width: 250px; height: 100vh;">
        <h4 class="text-center">🚀 CRM Panel</h4>
        <hr>

        <a href="/admin" class="text-white mb-3">📊 Dashboard</a>
        <a href="/admin/clients" class="text-white mb-3">👥 Clients</a>
        <a href="/admin/job_clients" class="text-white mb-3">🧑‍💼 Job Clients</a>
        <a href="/admin/services" class="text-white mb-3">🛠 Services</a>

        <div class="mt-auto">
            <hr>
            <a href="/logout" class="text-danger">🚪 Logout</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="p-4 w-100">

        <!-- Navbar -->
        <nav class="navbar navbar-light bg-light shadow-sm mb-4">
            <span class="navbar-brand">Welcome Admin 👋</span>
        </nav>

        <!-- 🔥 Dynamic Content -->
        {% block content %}{% endblock %}

    </div>

</div>

</body>
</html>

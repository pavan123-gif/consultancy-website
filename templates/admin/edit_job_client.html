<h2>Edit Job Client</h2>

<form method="POST">
    <input type="text" name="name" value="{{ job.name }}"><br><br>
    <input type="text" name="phone" value="{{ job.phone }}"><br><br>
    <input type="text" name="qualification" value="{{ job.qualification }}"><br><br>
    <input type="text" name="skills" value="{{ job.skills }}"><br><br>
    <input type="text" name="experience" value="{{ job.experience }}"><br><br>

    <button type="submit">Update</button>
</form>
